<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FaceRead IA — Claude Vision</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { color: #7F77DD; margin-bottom: 0.4rem; font-size: 1.6rem; }
    .subtitle { color: #555; font-size: 13px; margin-bottom: 1.5rem; }
    .main { display: flex; gap: 2rem; align-items: flex-start; }
    .video-wrapper { position: relative; width: 480px; height: 360px; }
    #webcam { width: 480px; height: 360px; border-radius: 12px; border: 2px solid #7F77DD; object-fit: cover; display: block; }
    .panel { width: 220px; display: flex; flex-direction: column; gap: 1rem; }
    .emotion-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 1.2rem; text-align: center; }
    .emotion-emoji { font-size: 2.5rem; margin-bottom: 0.3rem; }
    .emotion-label { font-size: 12px; color: #666; margin-bottom: 0.4rem; }
    .emotion-value { font-size: 2rem; font-weight: bold; color: #7F77DD; min-height: 2.5rem; }
    .confidence-value { font-size: 1rem; color: #1D9E75; margin-top: 0.3rem; }
    .bars { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 1rem; }
    .bars-title { font-size: 12px; color: #666; margin-bottom: 0.8rem; }
    .bar-row { margin-bottom: 0.5rem; }
    .bar-label { font-size: 11px; color: #aaa; display: flex; justify-content: space-between; margin-bottom: 3px; }
    .bar-track { background: #111; border-radius: 4px; height: 6px; }
    .bar-fill { height: 6px; border-radius: 4px; background: #7F77DD; transition: width 0.3s ease; }
    .api-key-input { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 1rem; }
    .api-key-input label { font-size: 12px; color: #666; display: block; margin-bottom: 0.5rem; }
    .api-key-input input { width: 100%; background: #111; border: 1px solid #333; border-radius: 6px; padding: 0.5rem; color: white; font-size: 12px; }
    .buttons { display: flex; gap: 0.5rem; margin-top: 1rem; }
    button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-weight: bold; }
    #btnStart { background: #7F77DD; color: white; }
    #btnStop  { background: #E24B4A; color: white; }
    #status { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0.8rem 1rem; font-family: monospace; font-size: 11px; color: #1D9E75; width: 100%; max-width: 720px; margin-top: 1.2rem; height: 80px; overflow-y: auto; }
    canvas { display: none; }
  </style>
</head>
<body>
  <h1>FaceRead IA</h1>
  <p class="subtitle">Détection d'émotions via Claude Vision — temps réel</p>

  <div class="main">
    <div>
      <div class="video-wrapper">
        <video id="webcam" autoplay playsinline muted></video>
      </div>
      <div class="buttons">
        <button id="btnStart" onclick="startCamera()">Démarrer</button>
        <button id="btnStop"  onclick="stopCamera()">Arrêter</button>
      </div>
    </div>

    <div class="panel">
      <div class="api-key-input">
        <label>Clé API Anthropic</label>
        <input type="password" id="apiKey" placeholder="sk-ant-...">
      </div>
      <div class="emotion-card">
        <div class="emotion-emoji" id="emoji">😐</div>
        <div class="emotion-label">Émotion détectée</div>
        <div class="emotion-value" id="emotionName">—</div>
        <div class="confidence-value" id="confidence">—</div>
      </div>
      <div class="bars">
        <div class="bars-title">Toutes les émotions</div>
        <div id="allBars"></div>
      </div>
    </div>
  </div>

  <div id="status">> En attente...</div>
  <canvas id="canvas" width="320" height="240"></canvas>

  <script>
    const EMOTIONS  = ['angry','disgust','fear','happy','neutral','sad','surprise'];
    const EMOJIS    = { angry:'😠', disgust:'🤢', fear:'😨', happy:'😊', neutral:'😐', sad:'😢', surprise:'😲' };
    const LABELS_FR = { angry:'Colère', disgust:'Dégoût', fear:'Peur', happy:'Joie', neutral:'Neutre', sad:'Tristesse', surprise:'Surprise' };

    let stream = null;
    let analyzing = false;
    let interval = null;

    const barsContainer = document.getElementById('allBars');
    EMOTIONS.forEach(e => {
      barsContainer.innerHTML += `
        <div class="bar-row">
          <div class="bar-label"><span>${LABELS_FR[e]}</span><span id="pct-${e}">0%</span></div>
          <div class="bar-track"><div class="bar-fill" id="bar-${e}" style="width:0%"></div></div>
        </div>`;
    });

    function log(msg) {
      const el = document.getElementById('status');
      el.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
      el.scrollTop = el.scrollHeight;
    }

    async function startCamera() {
      const apiKey = document.getElementById('apiKey').value;
      if (!apiKey) { log('Entre ta clé API Anthropic !'); return; }
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        document.getElementById('webcam').srcObject = stream;
        log('Caméra activée — analyse toutes les 3s...');
        interval = setInterval(() => analyzeFrame(apiKey), 3000);
      } catch(e) {
        log('Erreur caméra : ' + e.message);
      }
    }

    async function analyzeFrame(apiKey) {
      if (analyzing) return;
      analyzing = true;

      const video  = document.getElementById('webcam');
      const canvas = document.getElementById('canvas');
      const ctx    = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, 320, 240);
      const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 200,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 }},
                { type: 'text', text: 'Analyse ce visage et retourne UNIQUEMENT un JSON sans markdown: {"emotion": string, "confidence": number, "scores": {"angry": number, "disgust": number, "fear": number, "happy": number, "neutral": number, "sad": number, "surprise": number}}. Chaque score entre 0 et 100, leur somme = 100.' }
              ]
            }]
          })
        });

        const data   = await response.json();
        const result = JSON.parse(data.content[0].text);

        document.getElementById('emoji').textContent       = EMOJIS[result.emotion] || '😐';
        document.getElementById('emotionName').textContent = LABELS_FR[result.emotion] || result.emotion;
        document.getElementById('confidence').textContent  = result.confidence + '% de confiance';

        EMOTIONS.forEach(e => {
          const v = result.scores[e] || 0;
          document.getElementById('bar-' + e).style.width = v + '%';
          document.getElementById('pct-' + e).textContent  = v + '%';
        });

        log(`→ ${LABELS_FR[result.emotion]} (${result.confidence}%)`);
      } catch(err) {
        log('Erreur API : ' + err.message);
      }
      analyzing = false;
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      if (interval) { clearInterval(interval); interval = null; }
      document.getElementById('emotionName').textContent = '—';
      document.getElementById('emoji').textContent = '😐';
      log('Caméra arrêtée.');
    }
  </script>
</body>
</html>
